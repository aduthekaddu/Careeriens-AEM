<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"
     data-sly-call="${clientlib.all @ categories='careeriens.degreecards'}"/>
<sly data-sly-use.model="com.careeriens.core.models.DegreeCardsModel"/>

<section class="dc-section">

    <div class="dc-header">
        <h2 class="dc-title" data-sly-test="${model.sectionTitle}">
            ${model.sectionTitle @ context='text'}
        </h2>
        <p class="dc-subtitle" data-sly-test="${model.sectionSubtitle}">
            ${model.sectionSubtitle @ context='text'}
        </p>
    </div>

    <div class="dc-grid" data-sly-test="${model.hasCards}">
        <article class="dc-card dc-card--${card.badgeColor @ context='attribute'}"
                 data-sly-repeat.card="${model.cards}">

            <div class="dc-card-img-wrap">
                <img src="${card.imageRef @ context='uri'}"
                     alt="${card.title @ context='attribute'}"
                     class="dc-card-img"
                     loading="lazy"
                     data-sly-test="${card.imageRef}"/>
                <span class="dc-badge" data-sly-test="${card.badgeText}">
                    ${card.badgeText @ context='text'}
                </span>
            </div>

            <div class="dc-card-body">

                <div class="dc-card-meta">
                    <span class="dc-card-icon" data-sly-test="${card.iconRef}">
                        <img src="${card.iconRef @ context='uri'}"
                             alt=""
                             aria-hidden="true"
                             class="dc-icon-img"/>
                    </span>
                    <span class="dc-duration" data-sly-test="${card.duration}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="1.8" stroke-linecap="round"
                             stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        ${card.duration @ context='text'}
                    </span>
                </div>

                <h3 class="dc-card-title" data-sly-test="${card.title}">
                    ${card.title @ context='text'}
                </h3>

                <p class="dc-card-desc" data-sly-test="${card.description}">
                    ${card.description @ context='text'}
                </p>

                <ul class="dc-features" data-sly-test="${card.hasFeatures}">
                    <li class="dc-feature-item"
                        data-sly-repeat.feat="${card.features}">
                        <svg class="dc-check" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round"
                             aria-hidden="true">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        ${feat.featureText @ context='text'}
                    </li>
                </ul>

            </div>

            <div class="dc-card-footer">
                <a href="${card.knowMoreLink @ context='uri'}"
                   class="dc-btn dc-btn--outline">
                    Know More
                </a>
                <a href="${card.applyLink @ context='uri'}"
                   class="dc-btn dc-btn--filled">
                    Apply
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </a>
            </div>

        </article>
    </div>

</section>
