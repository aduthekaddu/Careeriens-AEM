<sly data-sly-use.model="com.careeriens.core.models.PdCurriculumModel" />

<div class="pd-panel" data-tab-label="${model.tabLabel @ context='attribute'}">
  <h2 class="pd-panel-title" data-sly-test="${model.title}">
    ${model.title @ context='text'}
  </h2>

  <div class="pd-accordion" data-sly-test="${model.hasPhases}">
    <div class="pd-accordion-item" data-sly-repeat.phase="${model.phaseList}">
      <button class="pd-accordion-btn" type="button">
        <span class="pd-accordion-title">
          ${phase.phaseTitle @ context='text'}
        </span>
        <span
          class="pd-accordion-subtitle"
          data-sly-test="${phase.hasSubtitle}"
        >
          ${phase.phaseSubtitle @ context='text'}
        </span>
        <svg
          class="pd-accordion-chevron"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>

      <div class="pd-accordion-body">
        <table class="pd-modules-table" data-sly-test="${phase.hasModules}">
          <thead>
            <tr>
              <th>Code</th>
              <th>Module</th>
              <th>Credits</th>
            </tr>
          </thead>
          <tbody>
            <tr data-sly-repeat.mod="${phase.modules}">
              <td class="pd-mod-code">${mod.moduleCode @ context='text'}</td>
              <td class="pd-mod-title">
                <strong>${mod.moduleTitle @ context='text'}</strong>
              </td>
              <td class="pd-mod-credits">${mod.credits @ context='text'}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
