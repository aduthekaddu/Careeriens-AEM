<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"
     data-sly-call="${clientlib.css @ categories='careeriens.enrollment'}"/>

<sly data-sly-use.model="com.careeriens.core.models.EnrollmentGatewayModel"/>

<section class="eg-wrapper">
    <div class="eg-layout">

        <!-- LEFT: heading + photo mosaic -->
        <div class="eg-left">
            <h1 class="eg-heading">${model.heading @ context='text'}</h1>
            <p class="eg-subtext" data-sly-test="${model.hasSubtext}">
                ${model.subtext @ context='text'}
            </p>

            <div class="eg-mosaic" data-sly-test="${model.hasImages}">
                <sly data-sly-repeat.img="${model.imageList}">
                    <div class="eg-mosaic-img">
                        <img src="${img @ context='uri'}"
                             alt=""
                             loading="lazy"
                             width="200"
                             height="180"/>
                    </div>
                </sly>
            </div>
        </div>

        <!-- RIGHT: payment info + form -->
        <div class="eg-right">

            <!-- Payment gateway info -->
            <div class="eg-payment-info">
                <div class="eg-payment-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                        <line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                </div>
                <div class="eg-payment-text">
                    <strong>Direct Payment Gateways</strong>
                    <span>Pay securely with your card or bank account.</span>
                    <div class="eg-payment-tags">
                        <span class="eg-tag">Razorpay</span>
                        <span class="eg-tag">UPI</span>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <form class="eg-form" id="enrollmentForm" novalidate>

                <div class="eg-form-section-title">Personal Details</div>

                <div class="eg-form-row">
                    <div class="eg-form-group">
                        <label for="eg-fname">First Name</label>
                        <input type="text" id="eg-fname" name="firstName"
                               placeholder="John" required/>
                    </div>
                    <div class="eg-form-group">
                        <label for="eg-lname">Last Name</label>
                        <input type="text" id="eg-lname" name="lastName"
                               placeholder="Doe" required/>
                    </div>
                </div>

                <div class="eg-form-row">
                    <div class="eg-form-group">
                        <label for="eg-email">Email</label>
                        <input type="email" id="eg-email" name="email"
                               placeholder="john@example.com" required/>
                    </div>
                    <div class="eg-form-group">
                        <label for="eg-phone">Phone Number</label>
                        <input type="tel" id="eg-phone" name="phone"
                               placeholder="+1 (555) 000-0000" required/>
                    </div>
                </div>

                <div class="eg-form-row">
                    <div class="eg-form-group">
                        <label for="eg-country">Country</label>
                        <input type="text" id="eg-country" name="country"
                               placeholder="United States"/>
                    </div>
                    <div class="eg-form-group">
                        <label for="eg-city">City</label>
                        <input type="text" id="eg-city" name="city"
                               placeholder="New York"/>
                    </div>
                </div>

                <div class="eg-form-group eg-form-group--full">
                    <label for="eg-addr1">Address Line 1</label>
                    <input type="text" id="eg-addr1" name="address1"
                           placeholder="123 Main St"/>
                </div>

                <div class="eg-form-group eg-form-group--full">
                    <label for="eg-addr2">Address Line 2</label>
                    <input type="text" id="eg-addr2" name="address2"
                           placeholder="Apt 4B (Optional)"/>
                </div>

                <div class="eg-form-row">
                    <div class="eg-form-group">
                        <label for="eg-state">State / Province</label>
                        <input type="text" id="eg-state" name="state"
                               placeholder="NY"/>
                    </div>
                    <div class="eg-form-group">
                        <label for="eg-zip">Zip / Postal Code</label>
                        <input type="text" id="eg-zip" name="zip"
                               placeholder="10001"/>
                    </div>
                </div>

                <div class="eg-form-row">
                    <div class="eg-form-group">
                        <label for="eg-course">Selected Course</label>
                        <div class="eg-course-field">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                 aria-hidden="true">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                            </svg>
                            <input type="text" id="eg-course" name="course"
                                   value="${model.courseName @ context='attribute'}"
                                   readonly/>
                        </div>
                    </div>
                    <div class="eg-form-group">
                        <label for="eg-fee">Course Fee</label>
                        <div class="eg-course-field">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                 aria-hidden="true">
                                <line x1="12" y1="1" x2="12" y2="23"/>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <input type="text" id="eg-fee" name="fee"
                                   value="${model.courseFee @ context='attribute'}"
                                   readonly/>
                        </div>
                    </div>
                </div>

                <button type="submit" class="eg-submit-btn"
                        data-key="${model.razorpayKeyId @ context='attribute'}"
                        data-course="${model.courseName @ context='attribute'}"
                        data-fee="${model.courseFee @ context='attribute'}">
                    Pay ${model.courseFee @ context='text'} &amp; Enroll
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </button>

                <p class="eg-terms" data-sly-test="${model.hasTerms}">
                    ${model.termsText @ context='html'}
                </p>

            </form>
        </div>

    </div>
</section>
